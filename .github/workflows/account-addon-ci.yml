name: Account Add-on CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-addons:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        addon_dir: ["tqqq_bot", "tqqq_bot_account_2"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Upgrade Pip
        working-directory: ${{ matrix.addon_dir }}
        run: python -m pip install --upgrade pip
      - name: Install Dependencies
        working-directory: ${{ matrix.addon_dir }}
        run: python -m pip install -r requirements.txt -r requirements-test.txt
      - name: Compile Python
        working-directory: ${{ matrix.addon_dir }}
        run: python -m compileall -q app tests wait_for_gateway.py
      - name: Check run.sh syntax
        working-directory: ${{ matrix.addon_dir }}
        run: bash -n run.sh

  validate-addons:
    name: Validate Add-on Parity and Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Requirements
        run: python -m pip install pyyaml
      - name: Check Add-on Parity
        run: python scripts/check_addon_parity.py
      - name: Validate Account Config
        run: python scripts/validate_account_addons.py

  diff-check:
    name: Validate Whitespace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Diff Check for Pull Requests
        if: github.event_name == 'pull_request'
        run: git diff --check origin/main...HEAD
      - name: Run Diff Check for Pushes
        if: github.event_name == 'push'
        run: git show --check --oneline --decorate HEAD
